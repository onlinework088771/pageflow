openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FB Agency Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: agency
    description: Agency configuration
  - name: accounts
    description: Facebook account management
  - name: pages
    description: Facebook page management
  - name: tokens
    description: Token management
  - name: overview
    description: Dashboard overview
  - name: logs
    description: Automation logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already in use

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /agency/settings:
    get:
      operationId: getAgencySettings
      tags: [agency]
      security:
        - bearerAuth: []
      summary: Get agency settings
      responses:
        "200":
          description: Agency settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
    put:
      operationId: updateAgencySettings
      tags: [agency]
      security:
        - bearerAuth: []
      summary: Update agency settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencySettingsBody"
      responses:
        "200":
          description: Updated agency settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"

  /agency/app-config:
    post:
      operationId: setupFacebookApp
      tags: [agency]
      security:
        - bearerAuth: []
      summary: Configure BYOC Facebook app credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FacebookAppConfigBody"
      responses:
        "200":
          description: App configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"

  /overview/stats:
    get:
      operationId: getOverviewStats
      tags: [overview]
      security:
        - bearerAuth: []
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewStats"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: List connected Facebook accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacebookAccount"
    post:
      operationId: createAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: Connect a Facebook account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Account connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookAccount"

  /accounts/{accountId}:
    get:
      operationId: getAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: Get a Facebook account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookAccount"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: Disconnect a Facebook account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Account disconnected

  /accounts/{accountId}/sync-pages:
    post:
      operationId: syncAccountPages
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: Sync pages from Facebook Graph API for an account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pages synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPagesResponse"

  /pages:
    get:
      operationId: listPages
      tags: [pages]
      security:
        - bearerAuth: []
      summary: List all managed pages
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, all]
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacebookPage"
    post:
      operationId: createPage
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Add a page to management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageBody"
      responses:
        "201":
          description: Page added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookPage"

  /pages/{pageId}:
    get:
      operationId: getPage
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Get page details
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookPage"
    patch:
      operationId: updatePage
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Update page settings
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageBody"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookPage"
    delete:
      operationId: deletePage
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Remove page from management
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Page removed

  /pages/{pageId}/automation:
    patch:
      operationId: updatePageAutomation
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Update page automation settings
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageAutomationBody"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookPage"

  /pages/{pageId}/source:
    patch:
      operationId: updatePageSource
      tags: [pages]
      security:
        - bearerAuth: []
      summary: Update page content source
      parameters:
        - name: pageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageSourceBody"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookPage"

  /accounts/{accountId}/available-pages:
    get:
      operationId: getAccountAvailablePages
      tags: [accounts]
      security:
        - bearerAuth: []
      summary: Get synced pages for a Facebook account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of synced pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacebookPage"

  /tokens:
    get:
      operationId: listTokens
      tags: [tokens]
      security:
        - bearerAuth: []
      summary: List token packages
      responses:
        "200":
          description: Token balance and packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensInfo"
    post:
      operationId: addTokens
      tags: [tokens]
      security:
        - bearerAuth: []
      summary: Add tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTokensBody"
      responses:
        "200":
          description: Updated token balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensInfo"

  /agency/verify-credentials:
    post:
      operationId: verifyFacebookCredentials
      tags: [agency]
      security:
        - bearerAuth: []
      summary: Verify Facebook App credentials with the Graph API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCredentialsBody"
      responses:
        "200":
          description: Credentials verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
        "400":
          description: Invalid credentials

  /agency/magic-link:
    post:
      operationId: generateMagicLink
      tags: [agency]
      security:
        - bearerAuth: []
      summary: Generate a short-lived magic link for cross-browser Facebook connection
      responses:
        "200":
          description: Magic link generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkResponse"

  /automation-logs:
    get:
      operationId: listAutomationLogs
      tags: [logs]
      security:
        - bearerAuth: []
      summary: List automation logs
      parameters:
        - name: pageId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of automation logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationLog"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SignupBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        agencyName:
          type: string
        name:
          type: string
      required: [email, password, agencyName, name]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        agencyName:
          type: string
        role:
          type: string
        createdAt:
          type: string
      required: [id, email, name, agencyName, role, createdAt]

    AgencySettings:
      type: object
      properties:
        id:
          type: string
        agencyName:
          type: string
        appId:
          type: string
        appSecret:
          type: string
        privacyPolicyUrl:
          type: string
        appConfigured:
          type: boolean
        appLive:
          type: boolean
        setupStep:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, agencyName, appConfigured, appLive, setupStep]

    UpdateAgencySettingsBody:
      type: object
      properties:
        agencyName:
          type: string
        privacyPolicyUrl:
          type: string

    FacebookAppConfigBody:
      type: object
      properties:
        appId:
          type: string
        appSecret:
          type: string
        privacyPolicyUrl:
          type: string
        step:
          type: integer
      required: [step]

    OverviewStats:
      type: object
      properties:
        activePagesCount:
          type: integer
        totalPagesCount:
          type: integer
        automationActiveCount:
          type: integer
        accountHealth:
          type: string
          enum: [active, warning, inactive]
        tokenBalance:
          type: integer
        systemStatus:
          type: string
          enum: [online, degraded, offline]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required: [activePagesCount, totalPagesCount, automationActiveCount, accountHealth, tokenBalance, systemStatus, recentActivity]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        timestamp:
          type: string
        pageName:
          type: string
      required: [id, type, message, timestamp]

    FacebookAccount:
      type: object
      properties:
        id:
          type: string
        fbUserId:
          type: string
        name:
          type: string
        email:
          type: string
        profilePicture:
          type: string
        pagesCount:
          type: integer
        status:
          type: string
          enum: [connected, expired, error]
        connectedAt:
          type: string
      required: [id, fbUserId, name, pagesCount, status, connectedAt]

    CreateAccountBody:
      type: object
      properties:
        accessToken:
          type: string
        name:
          type: string
        email:
          type: string
        fbUserId:
          type: string
      required: [accessToken, name, fbUserId]

    SyncPagesResponse:
      type: object
      properties:
        synced:
          type: integer
        pages:
          type: array
          items:
            $ref: "#/components/schemas/FacebookPage"
      required: [synced, pages]

    FacebookPage:
      type: object
      properties:
        id:
          type: string
        fbPageId:
          type: string
        name:
          type: string
        category:
          type: string
        profilePicture:
          type: string
        followersCount:
          type: integer
        automationEnabled:
          type: boolean
        postingFrequency:
          type: string
          enum: [daily, twice_daily, weekly, custom]
        status:
          type: string
          enum: [active, paused, error]
        accountId:
          type: string
        lastPostedAt:
          type: string
        sourceType:
          type: string
          enum: [instagram, youtube, tiktok]
        sourceIdentity:
          type: string
        postsPerDay:
          type: integer
        scheduleLogic:
          type: string
          enum: [fixed, random]
        timezone:
          type: string
        timeSlots:
          type: array
          items:
            type: string
        scrapingStatus:
          type: string
          enum: [pending, active, done]
        totalPosted:
          type: integer
        totalPending:
          type: integer
        totalFailed:
          type: integer
        createdAt:
          type: string
      required: [id, fbPageId, name, automationEnabled, status, accountId, createdAt, postsPerDay, scheduleLogic, timezone, scrapingStatus, totalPosted, totalPending, totalFailed]

    CreatePageBody:
      type: object
      properties:
        fbPageId:
          type: string
        name:
          type: string
        category:
          type: string
        accountId:
          type: string
        postingFrequency:
          type: string
          enum: [daily, twice_daily, weekly, custom]
        sourceType:
          type: string
          enum: [instagram, youtube, tiktok]
        sourceIdentity:
          type: string
        postsPerDay:
          type: integer
        scheduleLogic:
          type: string
          enum: [fixed, random]
        timezone:
          type: string
      required: [fbPageId, name, accountId]

    UpdatePageBody:
      type: object
      properties:
        automationEnabled:
          type: boolean
        postingFrequency:
          type: string
          enum: [daily, twice_daily, weekly, custom]
        status:
          type: string
          enum: [active, paused]

    UpdatePageAutomationBody:
      type: object
      properties:
        postsPerDay:
          type: integer
        scheduleLogic:
          type: string
          enum: [fixed, random]
        timezone:
          type: string
        timeSlots:
          type: array
          items:
            type: string
        automationEnabled:
          type: boolean

    UpdatePageSourceBody:
      type: object
      properties:
        sourceType:
          type: string
          enum: [instagram, youtube, tiktok]
        sourceIdentity:
          type: string
      required: [sourceType, sourceIdentity]

    TokensInfo:
      type: object
      properties:
        balance:
          type: integer
        packages:
          type: array
          items:
            $ref: "#/components/schemas/TokenPackage"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TokenTransaction"
      required: [balance, packages, transactions]

    TokenPackage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        tokens:
          type: integer
        price:
          type: number
      required: [id, name, tokens, price]

    TokenTransaction:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [purchase, usage, refund]
        amount:
          type: integer
        description:
          type: string
        timestamp:
          type: string
      required: [id, type, amount, description, timestamp]

    AddTokensBody:
      type: object
      properties:
        packageId:
          type: string
        amount:
          type: integer
      required: [amount]

    AutomationLog:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        message:
          type: string
        pageId:
          type: string
        pageName:
          type: string
        accountId:
          type: string
        status:
          type: string
          enum: [success, error, info]
        metadata:
          type: string
        createdAt:
          type: string
      required: [id, type, message, status, createdAt]

    VerifyCredentialsBody:
      type: object
      properties:
        appId:
          type: string
        appSecret:
          type: string
      required: [appId, appSecret]

    MagicLinkResponse:
      type: object
      properties:
        token:
          type: string
        url:
          type: string
        expiresAt:
          type: string
      required: [token, url, expiresAt]
